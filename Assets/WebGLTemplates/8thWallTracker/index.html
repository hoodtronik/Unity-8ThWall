<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, height=device-height, initial-scale=1.0, minimum-scale=1.0, user-scalable=no, shrink-to-fit=yes">
    <title>Unity WebGL Player | {{{ PRODUCT_NAME }}}</title>
    <link rel="stylesheet" href="TemplateData/style.css">
    <style>
        html { height: -webkit-fill-available; }
        body {
            margin: 0; padding: 0;
            min-height: 100vh; min-height: -webkit-fill-available;
            width: 100vw; overflow: hidden;
        }
        .ctaDiv {
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            position: absolute; left: 0; right: 0; top: 0; bottom: 0;
            background: #fffa; z-index: 99;
        }
        #startARButton {
            padding: 16px 32px; font-size: 18px; font-weight: bold;
            border: none; border-radius: 8px;
            background: #4a90d9; color: white; cursor: pointer;
        }
        #startARButton:hover { background: #3a7bc8; }
    </style>
</head>
<body>
    <div id="startARDiv" class="ctaDiv">
        <p style="text-align: center; width:60vw; font-size: 16px;">
            This augmented reality experience requires access to your device's camera
        </p>
        <button id="startARButton" onclick="StartAR()">START AR EXPERIENCE</button>
    </div>

    <div id="screenshotDiv" style="display: none;" class="ctaDiv">
        <div style="position:relative; background-color:white; padding:10px; box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.3);">
            <img id="screenshotImg" src="" alt="screenshot" style="width:80vw; height:80vh">
            <button onclick="document.getElementById('screenshotDiv').style.display = 'none';"
                    style="position:absolute; transform:translateY(-100%); right:0; top:0">Close</button>
        </div>
    </div>

    <div id="confirmUrlDiv" style="display: none;" class="ctaDiv">
        <div style="position:relative; background-color:white; padding:10px; box-shadow: 0 4px 8px 0 rgba(0, 0, 0, 0.3); width: 80vw; display:flex; flex-direction: column; align-items: center;">
            <p id="confirmUrlText" style="text-align: center; width:80%; overflow: hidden; text-overflow: ellipsis;">
                Are you sure you want to visit url.com?
            </p>
            <div>
                <button onclick="window.open(newUrlString, '_blank').focus(); document.getElementById('confirmUrlDiv').style.display = 'none'">VISIT SITE</button>
                <button onclick="document.getElementById('confirmUrlDiv').style.display = 'none'">GO BACK</button>
            </div>
        </div>
    </div>

    <div id="errorDiv" class="ctaDiv" style="display: none; background:#aaa">
        <p id="errorText" style="text-align: center; width:60vw; color:white"></p>
    </div>

    <div id="unity-container" class="unity-mobile">
        <canvas id="unity-canvas" style="width: 100%; height: 100%; background: #0000;"></canvas>
        <div id="unity-loading-bar">
            <div id="unity-logo"></div>
            <div id="unity-progress-bar-empty">
                <div id="unity-progress-bar-full"></div>
            </div>
        </div>
    </div>

    <!-- 8th Wall Engine (self-hosted, no app key required) -->
    <script src="xr.js"></script>
    <script src="xr-slam.js"></script>

    <!-- XR8 ↔ Unity Bridge (open source) -->
    <script src="xr8-bridge.js"></script>

    <!-- Unity WebGL Loader -->
    <script src="Build/{{{ LOADER_FILENAME }}}"></script>

    <script>
        var canvas = document.querySelector("#unity-canvas");
        var loadingBar = document.querySelector("#unity-loading-bar");
        var progressBarFull = document.querySelector("#unity-progress-bar-full");

        // Create bridge instances
        window.xr8Camera = new XR8CameraBridge(canvas);
        window.xr8Tracker = new XR8TrackerBridge();

        function StartAR() {
            canvas.style.width = window.innerWidth + "px";
            canvas.style.height = window.innerHeight + "px";

            document.getElementById("startARDiv").style.display = "none";

            createUnityInstance(canvas, {
                dataUrl: "Build/{{{ DATA_FILENAME }}}",
                frameworkUrl: "Build/{{{ FRAMEWORK_FILENAME }}}",
            #if USE_WASM
                codeUrl: "Build/{{{ CODE_FILENAME }}}",
            #endif
            #if MEMORY_FILENAME
                memoryUrl: "Build/{{{ MEMORY_FILENAME }}}",
            #endif
            #if SYMBOLS_FILENAME
                symbolsUrl: "Build/{{{ SYMBOLS_FILENAME }}}",
            #endif
                streamingAssetsUrl: "StreamingAssets",
                companyName: {{{ JSON.stringify(COMPANY_NAME) }}},
                productName: {{{ JSON.stringify(PRODUCT_NAME) }}},
                productVersion: {{{ JSON.stringify(PRODUCT_VERSION) }}},
            },
            (progress) => {
                progressBarFull.style.width = 100 * progress + "%";
            }).then((unityInstance) => {
                window.unityInstance = unityInstance;
                loadingBar.style.display = "none";

                // XR8 will be started by Unity's XR8Camera.cs via jslib calls
                console.log("[index] Unity loaded, waiting for XR8 start from C#...");
            }).catch((err) => {
                console.error("[index] Unity load error:", err);
                ShowError("Failed to load the experience: " + err);
            });

            loadingBar.style.display = "block";
        }

        // --- Helper functions (called from Helpers.jslib) ---

        function ShowError(error) {
            document.getElementById("errorDiv").style.display = "flex";
            document.getElementById("errorText").innerHTML = error;
        }

        function ShowScreenshot(dataUrl) {
            document.getElementById("screenshotDiv").style.display = "flex";
            document.getElementById("screenshotImg").src = dataUrl;
            document.getElementById("screenshotImg").style.width = "80vw";
            document.getElementById("screenshotImg").style.height =
                80 / window.innerWidth * window.innerHeight + "vw";
        }

        function ShowConfirmUrl(url) {
            document.getElementById("confirmUrlDiv").style.display = "flex";
            window.newUrlString = url;
            document.getElementById("confirmUrlText").innerText =
                "Are you sure you want to visit " + url;
        }
    </script>
</body>
</html>
